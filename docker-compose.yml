version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: cyber-threat-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: cyber_user
      MONGO_INITDB_ROOT_PASSWORD: secure_password
      MONGO_INITDB_DATABASE: cyber-threat-monitoring
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - cyber-threat-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber-threat-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://cyber_user:secure_password@mongodb:27017/cyber-threat-monitoring
      FRONTEND_URL: http://localhost:3000
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-placeholder}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-placeholder}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-placeholder}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - cyber-threat-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyber-threat-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SERVER_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cyber-threat-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  cyber-threat-network:
    driver: bridge
